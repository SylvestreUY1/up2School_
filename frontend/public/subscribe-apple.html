<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Accédez à votre abonnement Up2School sur iOS et macOS. Finalisez votre paiement en ligne avec Mobile Money ou Orange Money." />
  <title>UY1-Lib – Abonnement iOS & macOS | Up2School</title>

  <!-- Open Graph -->
  <meta property="og:title" content="UY1-Lib – Abonnement iOS & macOS" />
  <meta property="og:description" content="Finalisez votre abonnement Up2School sur iOS et macOS en ligne. Paiement sécurisé via Mobile Money." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://uy1-lib.uninet.cm/subscribe-apple.html" />
  <meta property="og:image" content="https://uy1-lib.uninet.cm/og-image.jpg" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="UY1-Lib – Abonnement iOS & macOS" />
  <meta name="twitter:description" content="Finalisez votre abonnement Up2School sur iOS et macOS. Paiement sécurisé." />
  <meta name="twitter:image" content="https://uy1-lib.uninet.cm/og-image.jpg" />

  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "UY1-Lib Abonnement iOS & macOS",
    "description": "Page de finalisation d'abonnement à Up2School pour les utilisateurs Apple.",
    "url": "https://uy1-lib.uninet.cm/subscribe-apple.html"
  }
  </script>

  <!-- Polices identiques à l'index -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Aclonica&family=Lato:wght@400;700;900&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <style>
    :root {
      --green: #1f6e50;
      --green-dark: #123d2c;
      --green-tint: #e7f0ea;
      --blue: #2c3e66;
      --blue-tint: #e8ebf3;
      --gold: #d18f2c;
      --gold-soft: #ffdf8c;
      --ink: #1b2a22;
      --ink-soft: #4a5562;
      --paper: #fbfaf8;
      --line: #dfe6e0;
      --bg-top: #eef2f9;
      --bg-bottom: #cfddee;

      --serif: "Aclonica", Georgia, serif;
      --sans: "Source Sans 3", system-ui, "Segoe UI", "Helvetica Neue", Roboto, sans-serif;
      --mono: "Lato", system-ui, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 0;
      font-family: var(--sans);
      background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 1600px;
      background: var(--paper);
      border-radius: 0;
      box-shadow: none;
      margin: 0;
      padding: 0;                /* le padding est géré par le header et le body */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      animation: cardIn 0.5s ease both;
      position: relative;
      overflow: hidden;
    }

    @media (min-width: 720px) {
      .card {
        margin: 20px auto;
        border-radius: 22px;
        box-shadow: 0 30px 60px -20px rgba(18,61,44,0.35);
        min-height: calc(100vh - 40px);
      }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- En-tête vert façon carte d'adhérent (comme l'index) --- */
    .card-header {
      position: relative;
      background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
      color: #fff;
      padding: 30px 28px 22px;
      width: 100%;
    }
    @media (min-width: 960px) {
      .card-header { padding: 38px 48px 26px; }
    }
    @media (min-width: 1280px) {
      .card-header { padding: 44px 64px 30px; }
    }

    /* Bordure perforée */
    .card-header::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -9px;
      height: 18px;
      background-image: radial-gradient(circle at 9px 9px, var(--bg-top) 8px, transparent 8.5px);
      background-size: 26px 18px;
      background-repeat: repeat-x;
      pointer-events: none;     /* pour ne pas gêner les interactions */
    }

    .header-inner {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-weight: 600;
      font-family: var(--mono);
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .back-link:hover {
      color: #fff;
      text-decoration: underline;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(255,255,255,0.14);
      border: 1.5px solid rgba(255,255,255,0.5);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      box-shadow: none;
    }

    .brand h1 {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 400;
      color: #fff;
      margin: 0;
      letter-spacing: -0.01em;
    }

    .slogan-row {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 0.2rem;
      font-family: var(--mono);
    }
    .slogan-row i {
      color: var(--gold-soft);
    }

    .barcode {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 18px;
      opacity: 0.5;
      margin-top: 0.5rem;
    }
    .barcode span {
      display: block;
      width: 2px;
      background: #fff;
    }

    /* --- Corps (formulaire centré) --- */
    .card-body {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 580px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      flex: 1;
    }

    @media (min-width: 720px) {
      .card-body {
        padding: 0;   /* le padding est dans la carte globale */
      }
    }

    h2.title {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--green-dark);
      text-align: center;
      margin-bottom: 0;
    }

    .subtitle {
      text-align: center;
      color: var(--ink-soft);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .notice {
      background: #fff6e3;
      border-left: 4px solid var(--gold);
      border-radius: 0.8rem;
      padding: 0.8rem 0.9rem;
      color: #5f4a1d;
      font-size: 0.88rem;
      line-height: 1.5;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .notice i {
      color: var(--green);
      font-size: 1rem;
      margin-top: 2px;
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .step {
      background: #fbfcfe;
      border: 1px solid var(--line);
      border-radius: 1rem;
      padding: 1.2rem;
      transition: box-shadow 0.2s;
    }
    .step:focus-within {
      box-shadow: 0 0 0 3px rgba(31,110,80,0.08);
    }

    .step h2 {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--green-dark);
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hidden { display: none; }

    .account-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--green-tint);
      color: var(--green-dark);
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 0.7rem;
      font-family: var(--mono);
      word-break: break-all;
    }

    .input-group {
      position: relative;
      margin-bottom: 0.4rem;
    }

    .input-group i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-soft);
      font-size: 0.95rem;
      pointer-events: none;
      transition: color 0.2s;
    }

    .input-group input {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      border: 1px solid var(--line);
      border-radius: 0.8rem;
      font-size: 0.95rem;
      color: var(--ink);
      background: white;
      font-family: var(--sans);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-group input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(31,110,80,0.12);
    }

    .input-group input:focus + i,
    .input-group input:focus ~ i {
      color: var(--green);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin-top: 0.8rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      border-radius: 0.9rem;
      padding: 0.8rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      font-family: var(--mono);
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--blue);
      color: white;
    }
    .btn-primary:hover {
      background: #1e2c49;
      transform: translateY(-1px);
      box-shadow: 0 8px 16px -6px rgba(44,62,102,0.4);
    }

    .btn-secondary {
      background: var(--blue-tint);
      color: var(--blue);
    }
    .btn-secondary:hover {
      background: #d9e0f0;
      transform: translateY(-1px);
      box-shadow: 0 6px 12px -6px rgba(0,0,0,0.1);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .status {
      min-height: 1.5rem;
      margin-top: 0.5rem;
      font-size: 0.88rem;
      line-height: 1.4;
    }
    .status.error { color: #a63737; }
    .status.success { color: var(--green-dark); }

    @media (max-width: 719px) {
      .card-header {
        padding: 24px 20px 20px;
      }
      .card-body {
        padding: 0 1.2rem;
      }
      .brand h1 {
        font-size: 1.3rem;
      }
      .actions {
        flex-direction: column;
      }
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- En-tête vert avec perforations -->
    <div class="card-header">
      <div class="header-inner">
        <div class="top-row">
          <a href="/index.html" class="back-link" aria-label="Retour à l'accueil">
            <i class="fas fa-arrow-left" aria-hidden="true"></i> Accueil
          </a>
          <div class="brand">
            <div class="brand-mark">
              <i class="fas fa-university" aria-hidden="true"></i>
            </div>
            <h1>UY1‑Lib</h1>
          </div>
        </div>
        <div class="slogan-row">
          <i class="fas fa-graduation-cap" aria-hidden="true"></i>
          Abonnement iOS & macOS
        </div>
        <div class="barcode" aria-hidden="true" id="barcode"></div>
      </div>
    </div>

    <!-- Corps de la carte : formulaire -->
    <div class="card-body">
      <h2 class="title">Finalisez votre abonnement</h2>
      <p class="subtitle">
        Entrez l'email associé à votre compte Up2School, puis votre numéro
        de téléphone pour continuer sur le web.
      </p>

      <div class="notice">
        <i class="fas fa-info-circle" aria-hidden="true"></i>
        <span>Réservé aux comptes existants. Votre accès sera actif une fois le paiement confirmé.</span>
      </div>

      <div class="steps">
        <section id="emailStep" class="step">
          <h2><i class="fas fa-envelope" aria-hidden="true"></i> 1. Votre email</h2>
          <div class="input-group">
            <i class="fas fa-at" aria-hidden="true"></i>
            <input
              id="email"
              type="email"
              autocomplete="email"
              placeholder="vous@exemple.com"
              aria-describedby="emailStatus"
            />
          </div>
          <div class="actions">
            <button id="emailButton" type="button" class="btn btn-primary">
              <i class="fas fa-arrow-right" aria-hidden="true"></i> Continuer
            </button>
          </div>
          <div id="emailStatus" class="status" role="status" aria-live="polite"></div>
        </section>

        <section id="phoneStep" class="step hidden">
          <h2><i class="fas fa-mobile-alt" aria-hidden="true"></i> 2. Paiement</h2>
          <div id="accountPill" class="account-pill">
            <i class="fas fa-check-circle" aria-hidden="true"></i>
            <span id="accountEmailDisplay"></span>
          </div>
          <div class="input-group">
            <i class="fas fa-phone" aria-hidden="true"></i>
            <input
              id="phone"
              type="tel"
              inputmode="tel"
              autocomplete="tel"
              placeholder="670000000"
              aria-describedby="phoneStatus"
            />
          </div>
          <div class="actions">
            <button id="checkoutButton" type="button" class="btn btn-primary">
              <i class="fas fa-credit-card" aria-hidden="true"></i> Payer maintenant
            </button>
            <button id="backButton" type="button" class="btn btn-secondary" aria-label="Modifier l'email">
              <i class="fas fa-pen" aria-hidden="true"></i> Modifier l'email
            </button>
          </div>
          <div id="phoneStatus" class="status" role="status" aria-live="polite"></div>
        </section>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const WEB_CHECKOUT_URL = "https://up2school-api.onrender.com/api/subscriptions/web-checkout";

      let selectedEmail = "";

      const emailStep = document.getElementById("emailStep");
      const phoneStep = document.getElementById("phoneStep");
      const emailInput = document.getElementById("email");
      const phoneInput = document.getElementById("phone");
      const emailButton = document.getElementById("emailButton");
      const checkoutButton = document.getElementById("checkoutButton");
      const backButton = document.getElementById("backButton");
      const accountEmailDisplay = document.getElementById("accountEmailDisplay");
      const emailStatus = document.getElementById("emailStatus");
      const phoneStatus = document.getElementById("phoneStatus");

      function setStatus(element, message, type) {
        element.textContent = message || "";
        element.className = "status" + (type ? " " + type : "");
      }

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
      }

      function showPhoneStep(email) {
        selectedEmail = email;
        accountEmailDisplay.textContent = email;
        emailStep.classList.add("hidden");
        phoneStep.classList.remove("hidden");
        setStatus(emailStatus, "", "");
        setStatus(phoneStatus, "", "");
        setTimeout(() => phoneInput.focus(), 50);
      }

      emailButton?.addEventListener("click", () => {
        const email = emailInput.value.trim().toLowerCase();
        if (!email) {
          setStatus(emailStatus, "Veuillez entrer votre email.", "error");
          emailInput.focus();
          return;
        }
        if (!isValidEmail(email)) {
          setStatus(emailStatus, "Format d'email invalide.", "error");
          emailInput.focus();
          return;
        }
        showPhoneStep(email);
      });

      backButton?.addEventListener("click", () => {
        phoneStep.classList.add("hidden");
        emailStep.classList.remove("hidden");
        setStatus(phoneStatus, "", "");
        setTimeout(() => emailInput.focus(), 50);
      });

      checkoutButton?.addEventListener("click", async () => {
        const phone = phoneInput.value.trim();
        if (!selectedEmail) {
          phoneStep.classList.add("hidden");
          emailStep.classList.remove("hidden");
          return;
        }
        if (!phone) {
          setStatus(phoneStatus, "Numéro de téléphone requis.", "error");
          phoneInput.focus();
          return;
        }

        const originalHTML = checkoutButton.innerHTML;
        checkoutButton.disabled = true;
        checkoutButton.innerHTML = '<i class="fas fa-spinner fa-pulse" aria-hidden="true"></i> Préparation...';
        setStatus(phoneStatus, "Connexion à la passerelle...", "success");

        try {
          const response = await fetch(WEB_CHECKOUT_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: selectedEmail, phone }),
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.error || "Erreur de paiement.");
          if (!data.paymentUrl) throw new Error("Lien de paiement non reçu.");

          setStatus(phoneStatus, "Redirection...", "success");
          window.location.href = data.paymentUrl;
        } catch (error) {
          setStatus(phoneStatus, error.message, "error");
          checkoutButton.disabled = false;
          checkoutButton.innerHTML = originalHTML;
        }
      });

      // Code-barres décoratif
      const barcode = document.getElementById("barcode");
      if (barcode) {
        const bars = 36;
        let html = "";
        for (let i = 0; i < bars; i++) {
          const h = 6 + Math.round(Math.random() * 12);
          html += `<span style="height:${h}px"></span>`;
        }
        barcode.innerHTML = html;
      }
    })();
  </script>
</body>
</html>
