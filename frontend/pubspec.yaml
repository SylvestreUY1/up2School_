name: up2school
description: Application de distribution de fichiers universitaires
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  app_links: ^6.0.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  flutter_timezone: ^4.1.1
  timezone: ^0.10.1

  syncfusion_flutter_pdfviewer: ^32.2.3
  photo_view: ^0.14.0
  share_plus: ^7.2.0
  clipboard: ^0.1.3
  dio: ^5.3.3
  webview_flutter: ^4.4.2
  shared_preferences: ^2.2.2
  http: ^1.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^19.5.0
  firebase_messaging: ^15.2.10
  web_socket_channel: ^2.4.0

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.2

  # UI et Utilitaires
  provider: ^6.1.1
  file_picker: ^8.0.0
  open_filex: ^4.2.0
  path_provider: ^2.1.1
  path: ^1.9.0
  intl: ^0.20.2
  cached_network_image: ^3.3.0
  image: ^4.8.0
  flutter_pdfview: ^1.3.2
  permission_handler: ^11.0.2
  fluttertoast: ^8.2.4
  url_launcher: ^6.2.2

  cupertino_icons: ^1.0.6
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4
  hive_generator: ^2.0.0
  build_runner: ^2.3.3
  inno_bundle: ^0.11.2

  # share link
  app_links: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/fonts/

  fonts:
    - family: Aclonica
      fonts:
        - asset: assets/fonts/Aclonica-Regular.ttf

# ==========================
# CONFIGURATION LOGO APP
# ANDROID + IOS
# ==========================
flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/images/icon.png"

  adaptive_icon_background: "#307A59"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"

  remove_alpha_ios: true
  windows:
    generate: true
    image_path: "assets/images/icon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/images/icon.png"

hooks:
  user_defines:
    sqlite3:
      source: system
      name: sqlite3

inno_bundle:
  id: b8e7c12f-6825-4c07-9b2f-48d88414457e
  name: UY1-Lib
  publisher: Up2School
  executable_name: UY1-Lib.exe
  setup_icon: "windows/runner/resources/app_icon.ico"
  languages:
    - english
    - french
